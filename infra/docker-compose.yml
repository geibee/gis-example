# ローカル開発専用の compose 構成。本番環境ではこのファイルを使わないこと。
# 本番は ECS Fargate + Secrets Manager/SSM を前提とし、必要な環境変数の一覧は
# docs/environment-variables.md を参照。
#
# 資格情報は infra/.env から供給する (gitignore 済み)。初回は次を実行:
#   cp infra/.env.example infra/.env
services:
  postgres:
    restart: unless-stopped
    build:
      context: ./postgres
    image: web-gis-postgis:16-3
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gis}
      POSTGRES_USER: ${POSTGRES_USER:-gis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?infra/.env が未作成です (cp infra/.env.example infra/.env)}
    # ホストへの公開はローカル開発用にループバックのみ。本番では公開しないこと
    # (API の認可を迂回して DB へ直接アクセスできてしまう)。
    # ホスト側で 5432 が使用中の場合は POSTGRES_HOST_PORT で変更できる
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # initdb (初回のみ) では拡張・スキーマ作成と、app テーブルに依存しない
      # GIS データ (010) だけを投入する。テーブル DDL は API 起動時の
      # Flyway マイグレーションが適用し、app テーブルに依存するシード
      # (020/040/050/060/070) はその後に seed サービスが投入する
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - ./postgres/010-seed-tokyo-gis-data.sql.gz:/docker-entrypoint-initdb.d/010-seed-tokyo-gis-data.sql.gz:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gis} -d ${POSTGRES_DB:-gis}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # 開発用シードの one-shot 投入 (Flyway マイグレーション適用後に app テーブルへ投入する)。
  # 各シードはセンチネル行で冪等化済みのため、up を繰り返しても再適用しない。
  # 本番構成ではこのサービスを含めないこと
  seed:
    build:
      context: ./postgres
    image: web-gis-postgis:16-3
    restart: "no"
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB:-gis}
      PGUSER: ${POSTGRES_USER:-gis}
      PGPASSWORD: ${POSTGRES_PASSWORD:?infra/.env が未作成です (cp infra/.env.example infra/.env)}
    entrypoint: ["bash", "/seed/seed-dev-data.sh"]
    volumes:
      - ./postgres:/seed:ro
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  martin:
    restart: unless-stopped
    image: ghcr.io/maplibre/martin:1.3.1
    environment:
      # パスワードは URL に埋め込むため、dev 既定以外を使う場合は URL 予約文字を避けること
      DATABASE_URL: postgres://${POSTGRES_USER:-gis}:${POSTGRES_PASSWORD:?infra/.env が未作成です (cp infra/.env.example infra/.env)}@postgres:5432/${POSTGRES_DB:-gis}
    command: ["--config", "/config/martin.yaml"]
    # タイルは API (/api/tiles) 経由で配信する。Martin の直接公開は API の認可を
    # 迂回する経路になるため、ローカル開発用にループバックのみに限定する
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./martin/martin.yaml:/config/martin.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  keycloak:
    restart: unless-stopped
    image: quay.io/keycloak/keycloak:26.2
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?infra/.env が未作成です (cp infra/.env.example infra/.env)}
      KC_HTTP_PORT: "8080"
    # start-dev と realm import (開発ユーザー・ROPC 込み) はローカル開発専用。
    # 本番 realm の要件は docs/environment-variables.md の ROPC / dev シードの節を参照
    command: ["start-dev", "--import-realm"]
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  api:
    restart: unless-stopped
    build:
      context: ../apps/api
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-gis}
      DATABASE_USER: ${POSTGRES_USER:-gis}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?infra/.env が未作成です (cp infra/.env.example infra/.env)}
      UPLOAD_DIR: /data/uploads
      # アップロード保存先 (local | s3)。dev 既定は従来どおり local (volume 共有)。
      # S3 経路を試す場合は infra/.env で UPLOAD_STORAGE=s3 にして
      # `docker compose --profile s3 up` で MinIO を同時に起動する。
      # 本番は UPLOAD_STORAGE=s3 + 実 S3 (エンドポイント上書きなし、認証はタスクロール)
      UPLOAD_STORAGE: ${UPLOAD_STORAGE:-local}
      S3_BUCKET: ${S3_BUCKET:-gis-uploads}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-}
      # URL 系はすべて localhost = dev 専用の値。本番 (CloudFront/ALB 配下) では
      # 公開 HTTPS URL を注入する (一覧と信頼境界は docs/reverse-proxy.md)
      API_PUBLIC_URL: http://localhost:8080
      WEB_ORIGIN: http://localhost:5173
      # iss クレームはブラウザから見た Keycloak の URL、JWKS の取得はコンテナ間ネットワーク経由
      OIDC_ISSUER: http://localhost:8081/realms/gis
      OIDC_AUDIENCE: gis-api
      OIDC_JWKS_URL: http://keycloak:8080/realms/gis/protocol/openid-connect/certs
      AUTH_ADMIN_EMAILS: admin@gis.example
      # dev は API を直接公開するため X-Forwarded-* を信頼しない (0 = プラグイン無効)。
      # 本番は信頼できるプロキシ段数 (例: CloudFront+ALB=2) を設定する
      TRUSTED_PROXY_COUNT: "0"
    ports:
      - "8080:8080"
    volumes:
      - ../data:/data
    depends_on:
      postgres:
        condition: service_healthy

  worker-gis:
    restart: unless-stopped
    build:
      context: ../apps/worker-gis
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB:-gis}
      PGUSER: ${POSTGRES_USER:-gis}
      PGPASSWORD: ${POSTGRES_PASSWORD:?infra/.env が未作成です (cp infra/.env.example infra/.env)}
      POLL_INTERVAL_SECONDS: "2"
      # upload_path が s3:// のジョブを読むための S3 設定 (api 側と対で切り替える)
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      AWS_REGION: ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-}
    volumes:
      - ../data:/data
    depends_on:
      postgres:
        condition: service_healthy

  # S3 経路の開発用オブジェクトストレージ (S3 互換)。既定では起動しない:
  #   UPLOAD_STORAGE=s3 を infra/.env に設定した上で
  #   docker compose -f infra/docker-compose.yml --profile s3 up --build
  # 本番は実 S3 を使うため、このサービスは本番構成に含めない
  minio:
    profiles: ["s3"]
    restart: unless-stopped
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-secret}
    # ローカル開発用にループバックのみ公開 (9001 は管理コンソール)
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data

  # アップロード用バケットの one-shot 作成 (冪等: --ignore-existing)
  minio-init:
    profiles: ["s3"]
    restart: "no"
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-secret}
      S3_BUCKET: ${S3_BUCKET:-gis-uploads}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set dev http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done
        mc mb --ignore-existing "dev/$$S3_BUCKET"
    depends_on:
      - minio

  web:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    # ホスト側で 5173 が使用中の場合は WEB_HOST_PORT で変更できる
    # (OIDC のリダイレクト URI と CORS は 5173 前提のため、UI を使う場合は既定のままにする)
    ports:
      - "${WEB_HOST_PORT:-5173}:80"
    depends_on:
      - api
      - martin

volumes:
  postgres-data:
  minio-data:
