# ローカル開発 / E2E 用の ElasticMQ (SQS 互換) キュー定義。--profile sqs でのみ起動する。
# 本番は実 SQS を使うためこのファイルは使わない。visibility timeout・maxReceiveCount の
# 設計値は本番キューと対で保つ (docs/jobs-architecture.md)
include classpath("application.conf")

queues {
  analysis-jobs {
    defaultVisibilityTimeout = 120 seconds
    deadLettersQueue {
      name = "analysis-jobs-dlq"
      maxReceiveCount = 5
    }
  }
  analysis-jobs-dlq { }
  import-jobs {
    defaultVisibilityTimeout = 120 seconds
    deadLettersQueue {
      name = "import-jobs-dlq"
      maxReceiveCount = 5
    }
  }
  import-jobs-dlq { }
}
