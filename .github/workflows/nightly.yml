# nightly の重量ゲート。push / PR の軽量ゲート (verify.yml) が扱わない検査を回す:
#   - security: gitleaks (git 履歴全体のシークレット検出) / Trivy (HIGH,CRITICAL 脆弱性) / SBOM
#   - smoke-e2e: docker compose スタック全体で「取込 → 検索 → 分析 → タイル」の実データフロー
# 失敗時は ci-nightly ラベル付き Issue に起票する (既存 open Issue があればコメント追記)
name: nightly

on:
  schedule:
    - cron: "0 18 * * *" # 03:00 JST
  workflow_dispatch:
  # workflow_dispatch を叩けない環境 (actions:write の無いエージェント) 向けの起動経路。
  # .ci/nightly-request の内容を変えて push すると起動する
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - ".ci/nightly-request"

permissions:
  contents: read
  issues: write

jobs:
  security:
    name: セキュリティスキャン (gitleaks / Trivy / SBOM)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks が git 履歴全体を走査する

      - name: gitleaks をインストール
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: シークレット検出 (git 履歴全体)
        run: |
          mkdir -p ci-results/sarif
          gitleaks detect --source . \
            --report-format sarif \
            --report-path ci-results/sarif/gitleaks.sarif

      - name: Trivy をインストール (脆弱性スキャン / SBOM)
        run: |
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: 脆弱性スキャン (HIGH / CRITICAL で失敗)
        run: |
          trivy fs --scanners vuln --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format sarif --output ci-results/sarif/trivy.sarif .

      - name: SBOM 生成 (CycloneDX)
        if: always()
        run: trivy fs --format cyclonedx --output ci-results/sbom.cdx.json .

      - name: スキャン成果物をアップロード (SARIF / SBOM)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-results
          path: ci-results/
          retention-days: 14
          if-no-files-found: warn

  api-fuzz:
    name: API fuzz (Schemathesis)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      db:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: gis
          POSTGRES_PASSWORD: gis
          POSTGRES_DB: gis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gis -d gis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Schemathesis をインストール
        run: pip install schemathesis
      - name: DB スキーマ適用
        env:
          PGPASSWORD: gis
        run: psql -h localhost -U gis -d gis -q -f infra/postgres/init.sql
      # API は OIDC 必須のため、開発 realm を import した Keycloak を IdP として立てる。
      # realm ファイルは checkout 後に volume mount する必要があるため、
      # services: ではなく docker run で起動する
      - name: Keycloak を起動 (OIDC IdP)
        run: |
          docker run -d --name keycloak -p 8081:8080 \
            -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
            -e KC_BOOTSTRAP_ADMIN_PASSWORD=admin \
            -v "$PWD/infra/keycloak:/opt/keycloak/data/import:ro" \
            quay.io/keycloak/keycloak:26.2 start-dev --import-realm
      - name: API をバックグラウンド起動
        working-directory: apps/api
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/gis
          DATABASE_USER: gis
          DATABASE_PASSWORD: gis
          UPLOAD_DIR: /tmp/fuzz-uploads
          OIDC_ISSUER: http://localhost:8081/realms/gis
          OIDC_AUDIENCE: gis-api
          AUTH_ADMIN_EMAILS: admin@gis.example
        run: |
          gradle run --no-daemon > /tmp/fuzz-api.log 2>&1 &
          for _ in $(seq 1 60); do
            curl -sf --max-time 2 http://localhost:8080/health >/dev/null 2>&1 && exit 0
            sleep 5
          done
          echo "API が起動しません"; tail -50 /tmp/fuzz-api.log; exit 1
      # 全 API が認証必須のため、認証付きでファズしないとほぼ全てが 401 で終わり
      # ハンドラ本体に到達しない (smoke-e2e と同じ ROPC でトークンを取得する)
      - name: Keycloak からアクセストークンを取得
        run: |
          token=""
          for _ in $(seq 1 36); do
            token=$(curl -sf --max-time 5 -X POST \
              http://localhost:8081/realms/gis/protocol/openid-connect/token \
              -d grant_type=password -d client_id=gis-web \
              -d username=gis-admin -d password=gis-admin \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["access_token"])' \
              2>/dev/null) && [ -n "$token" ] && break
            sleep 5
          done
          if [ -z "$token" ]; then
            echo "Keycloak からトークンを取得できません"
            docker logs keycloak 2>&1 | tail -50
            exit 1
          fi
          echo "::add-mask::$token"
          echo "FUZZ_AUTH_TOKEN=$token" >> "$GITHUB_ENV"
      - name: ファズ実行 (非ブロッキング運用中)
        run: bash scripts/fuzz-api.sh | tee /tmp/fuzz-report.log
      - name: ファズログをアップロード
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-results
          path: |
            /tmp/fuzz-report.log
            /tmp/fuzz-api.log
          if-no-files-found: ignore

  smoke-e2e:
    name: スモーク E2E (docker compose 全スタック)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: 取込 → 検索 → 分析 → タイルのスモーク実行
        run: bash scripts/smoke-e2e.sh
      - name: compose ログをアップロード (失敗時)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-compose-logs
          path: /tmp/smoke-compose.log
          if-no-files-found: ignore

  escalate:
    name: 失敗時に Issue へエスカレーション
    needs: [security, smoke-e2e, api-fuzz]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ci-nightly Issue を起票 / 追記
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create ci-nightly --color d73a4a \
            --description "nightly CI の失敗" --force || true
          existing=$(gh issue list --label ci-nightly --state open \
            --json number --jq '.[0].number' || true)
          body=$(printf '%s\n\n%s' \
            "nightly CI が失敗しました: ${RUN_URL}" \
            "SARIF / SBOM / compose ログは run のアーティファクトを参照。")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "nightly CI 失敗 ($(date -u +%Y-%m-%d))" \
              --label ci-nightly --body "$body"
          fi
