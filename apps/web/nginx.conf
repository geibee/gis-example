server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ---------------------------------------------------------------- セキュリティヘッダ
  # ここに置くのは「CloudFront (Response Headers Policy) が付けない前提の既定」。
  # HSTS (Strict-Transport-Security) は付けない: TLS 終端は CloudFront/ALB の責務であり、
  # HSTS は TLS を終端する CloudFront 側のポリシーで付与する (二重管理しない)。
  #
  # CSP の各ディレクティブの根拠:
  # - style-src 'unsafe-inline' : MapLibre GL がコントロール・マーカー描画で DOM へ
  #   inline style を注入するため必要 (無いと地図 UI が崩れる)
  # - worker-src/child-src blob: : MapLibre GL はタイル解析用 WebWorker を blob: URL から
  #   生成する (child-src は worker-src 未対応ブラウザ向けフォールバック)
  # - img-src data: blob: : MapLibre のスプライト・ラスタ描画が data:/blob: URL を使う
  # - https://tile.openstreetmap.org : 背景タイル (src/constants.ts の BASEMAP)。
  #   fetch で取得されるため connect-src にも必要
  # - connect-src 'self' : API は同一オリジン (/api 経由)
  # - __CSP_CONNECT_SRC_EXTRA__ : OIDC IdP (authority) 等、環境ごとに異なる接続先。
  #   Dockerfile の build-arg CSP_CONNECT_SRC_EXTRA でビルド時に置換される
  #   (既定は dev の Keycloak http://localhost:8081)
  # - frame-src 'self' + IdP : OIDC silent renew / silent サインインが IdP の authorize
  #   エンドポイントを不可視 iframe で開くため必要 (redirect_uri の silent-renew.html は 'self')
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tile.openstreetmap.org; connect-src 'self' https://tile.openstreetmap.org __CSP_CONNECT_SRC_EXTRA__; worker-src blob:; child-src blob:; frame-src 'self' __CSP_CONNECT_SRC_EXTRA__; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
  # frame-ancestors 'none' の旧ブラウザ向け補完
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  # 本アプリは位置情報・カメラ・マイクを使わない (地図操作はマウス/タッチのみ)
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

  # GIS ファイル取込があるため既定 1m から引き上げる (API 側 UPLOAD_MAX_BYTES と揃える)
  client_max_body_size 200m;

  location /api/ {
    proxy_pass http://api:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # TLS 終端は CloudFront/ALB。上流 (ALB) が付けた X-Forwarded-Proto をそのまま API へ
    # 引き継ぐ (API 側は TRUSTED_PROXY_COUNT で信頼段数を判断する)。
    # dev の直接アクセスではヘッダが無い = 空になり、nginx はヘッダ自体を付けない
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  location /health {
    proxy_pass http://api:8080/health;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri /index.html;
  }
}
